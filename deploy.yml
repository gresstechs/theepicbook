---
- name: Deploy EpicBook Application
  hosts: app
  become: true
  vars:
    app_dir: /opt/epicbook
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install dependencies
      apt:
        name:
          - nginx
          - curl
        state: present

    - name: Install Node.js 18.x
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
        apt-get install -y nodejs
      args:
        executable: /bin/bash

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes

    - name: Install MySQL server
      apt:
        name: mysql-server
        state: present

    - name: Start and enable MySQL
      service:
        name: mysql
        state: started
        enabled: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: azureuser
        group: azureuser
        mode: '0755'

    - name: Copy all application files
      copy:
        src: "{{ item }}"
        dest: "{{ app_dir }}/"
        owner: azureuser
        group: azureuser
      loop:
        - package.json
        - package-lock.json
        - server.js

    - name: Copy config directory
      copy:
        src: config/
        dest: "{{ app_dir }}/config/"
        owner: azureuser
        group: azureuser

    - name: Copy models directory
      copy:
        src: models/
        dest: "{{ app_dir }}/models/"
        owner: azureuser
        group: azureuser

    - name: Copy routes directory
      copy:
        src: routes/
        dest: "{{ app_dir }}/routes/"
        owner: azureuser
        group: azureuser

    - name: Copy views directory
      copy:
        src: views/
        dest: "{{ app_dir }}/views/"
        owner: azureuser
        group: azureuser

    - name: Copy public directory
      copy:
        src: public/
        dest: "{{ app_dir }}/public/"
        owner: azureuser
        group: azureuser

    - name: Copy db directory
      copy:
        src: db/
        dest: "{{ app_dir }}/db/"
        owner: azureuser
        group: azureuser

    - name: Set MySQL root password
      shell: |
        sudo mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'demo1234'; FLUSH PRIVILEGES;" 2>/dev/null || \
        mysql -u root -pdemo1234 -e "SELECT 1;" 2>/dev/null || \
        true
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Create bookstore database
      shell: mysql -u root -pdemo1234 -e "CREATE DATABASE IF NOT EXISTS bookstore;"
      args:
        executable: /bin/bash

    - name: Run database schema
      shell: mysql -u root -pdemo1234 bookstore < {{ app_dir }}/db/BuyTheBook_Schema.sql
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Run author seed
      shell: mysql -u root -pdemo1234 bookstore < {{ app_dir }}/db/author_seed.sql
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Run books seed
      shell: mysql -u root -pdemo1234 bookstore < {{ app_dir }}/db/books_seed.sql
      args:
        executable: /bin/bash
      ignore_errors: yes

    - name: Verify package.json exists
      stat:
        path: "{{ app_dir }}/package.json"
      register: pkg_json

    - name: Fail if package.json missing
      fail:
        msg: "package.json not found in {{ app_dir }}"
      when: not pkg_json.stat.exists

    - name: Install Node dependencies
      shell: cd {{ app_dir }} && npm install
      args:
        executable: /bin/bash

    - name: Start app with PM2
      become_user: azureuser
      shell: |
        cd {{ app_dir }}
        pm2 delete epicbook 2>/dev/null || true
        pm2 start server.js --name epicbook
        pm2 save
      args:
        executable: /bin/bash

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/epicbook
        content: |
          server {
              listen 80;
              server_name _;
              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/epicbook
        dest: /etc/nginx/sites-enabled/epicbook
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
        enabled: yes
