---
- name: Deploy EpicBook Application
  hosts: app
  become: true

  vars:
    app_dir: /opt/epicbook
    node_version: "18"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install dependencies
      apt:
        name:
          - nginx
          - git
          - curl
        state: present

    - name: Install Node.js
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
        apt-get install -y nodejs
      args:
        executable: /bin/bash

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: azureuser
        group: azureuser
        mode: '0755'

    - name: Copy application files
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}/"
        rsync_opts:
          - "--exclude=playbooks"
          - "--exclude=.git"
          - "--exclude=node_modules"

    - name: Install Node dependencies
      npm:
        path: "{{ app_dir }}"

    - name: Start app with PM2
      become_user: azureuser
      shell: |
        cd {{ app_dir }}
        pm2 delete epicbook 2>/dev/null || true
        pm2 start server.js --name epicbook
        pm2 save
      args:
        executable: /bin/bash

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/epicbook
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/epicbook
        dest: /etc/nginx/sites-enabled/epicbook
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
        enabled: yesm
